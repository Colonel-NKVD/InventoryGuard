name: Build LDM Plugin

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4 # Актуальная версия экшена

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild InventoryGuard.csproj /p:Configuration=Release

    - name: Upload DLL
      uses: actions/upload-artifact@v4 # В 2026 используем v4 для быстрой выгрузки
      with:
        name: InventoryGuard-Release
        path: bin/Release/net461/InventoryGuard.dll
