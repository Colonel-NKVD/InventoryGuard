name: Build LDM Plugin

on: [push]

jobs:
  build:
    runs-on: windows-2022 # Указываем конкретную версию сервера
    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore InventoryGuard.csproj

    - name: Build
      run: msbuild InventoryGuard.csproj /p:Configuration=Release /p:TargetFramework=net472

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: InventoryGuard-Release
        path: bin/Release/net472/InventoryGuard.dll
